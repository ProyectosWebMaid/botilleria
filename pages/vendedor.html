<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendedor | Botillería La Central</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div><div class="brand-mini"><img src="../assets/logo_maild_small.png" alt="MAILD"><span>MAILD</span></div><p class="muted-light">Panel Vendedor</p></div>
      <nav>
        <a class="tab-link active" data-tab="registro" href="#">Registrar productos</a>
        <a class="tab-link" data-tab="voucher" href="#">Voucher emitidos</a>
      </nav>
      <button class="btn secondary full" id="logoutBtn">Cerrar sesión</button>
    </aside>

    <main class="content">
      <header class="topbar-page">
        <div class="brand-topbar"><img src="../assets/logo_maild_small.png" alt="MAILD"><div><h1>Panel de Vendedor</h1><p id="welcomeText"></p></div></div>
        <span class="role-pill">Vendedor</span>
      </header>

      <section class="tab-panel active" id="registro">
        <section class="panel-grid">
          <article class="panel-card">
            <h3>Escaneo / registro de productos</h3>
            <form id="sellerBarcodeForm" class="mini-form">
              <label>Escanear código o escribir nombre</label>
              <input id="sellerBarcodeInput" type="text" placeholder="Ej: 7801111111111 o Whisky Johnnie Walker" />
              <button class="btn secondary" type="submit">Buscar producto</button>
            </form>

            <form id="sellerItemForm" class="mini-form">
              <label>Producto encontrado / selección manual</label>
              <select id="sellerProduct"></select>
              <label>Cantidad</label>
              <input id="sellerQty" type="number" min="1" value="1" />
              <button class="btn primary" type="submit">Agregar a voucher</button>
            </form>
            <div class="notice" id="sellerNotice"></div>
          </article>
          <article class="panel-card">
            <h3>Detalle de la venta preparada</h3>
            <table>
              <thead><tr><th>Producto</th><th>Cant.</th><th>Total</th><th>Acción</th></tr></thead>
              <tbody id="sellerCartTable"></tbody>
            </table>
            <p class="voucher-total">Total voucher: <strong id="sellerCartTotal">$0</strong></p>
            <div class="link-row">
              <button class="btn primary" id="generateVoucherBtn" type="button">Emitir baucher</button>
              <a class="btn secondary" id="downloadVoucherBtn" href="#" style="display:none;">Descargar baucher</a>
            </div>
          </article>
        </section>
      </section>

      <section class="tab-panel" id="voucher">
        <div class="panel-card">
          <h3>Voucher emitidos</h3>
          <table>
            <thead><tr><th>Código</th><th>Fecha</th><th>Total</th><th>Estado</th><th>Descarga</th></tr></thead>
            <tbody id="sellerVoucherTable"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/tabs.js"></script>
  <script src="../js/vendedor.js"></script>
</body>
</html>
