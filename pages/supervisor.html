<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supervisor | Botillería La Central</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div><h2>La Central</h2><p class="muted-light">Panel Supervisor</p></div>
      <nav>
        <a class="tab-link active" data-tab="resumen" href="#">Resumen</a>
        <a class="tab-link" data-tab="stock" href="#">Stock</a>
        <a class="tab-link" data-tab="boletas" href="#">Boletas</a>
        <a class="tab-link" data-tab="reportes" href="#">Reportes</a>
      </nav>
      <button class="btn secondary full" id="logoutBtn">Cerrar sesión</button>
    </aside>

    <main class="content">
      <header class="topbar-page">
        <div><h1>Panel de Supervisor</h1><p id="welcomeText"></p></div>
        <span class="role-pill">Supervisor</span>
      </header>

      <section class="tab-panel active" id="resumen">
        <section class="stats-grid">
          <article class="stat-box"><span>Stock crítico</span><strong id="supLow">0</strong></article>
          <article class="stat-box"><span>Boletas</span><strong id="supReceipt">0</strong></article>
          <article class="stat-box"><span>Ventas</span><strong id="supSales">$0</strong></article>
          <article class="stat-box"><span>Productos</span><strong id="supProducts">0</strong></article>
        </section>
      </section>

      <section class="tab-panel" id="stock">
        <div class="panel-card">
          <h3>Stock bajo</h3>
          <table><thead><tr><th>Producto</th><th>Stock</th><th>Mínimo</th></tr></thead><tbody id="supervisorStock"></tbody></table>
        </div>
      </section>

      <section class="tab-panel" id="boletas">
        <div class="panel-card">
          <h3>Revisión de boletas</h3>
          <table><thead><tr><th>N°</th><th>Fecha</th><th>Estado</th></tr></thead><tbody id="supervisorReceipts"></tbody></table>
        </div>
      </section>

      <section class="tab-panel" id="reportes">
        <div class="panel-card">
          <h3>Indicadores</h3>
          <table><thead><tr><th>Indicador</th><th>Valor</th></tr></thead><tbody id="supervisorReport"></tbody></table>
        </div>
      </section>
    </main>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/tabs.js"></script>
  <script src="../js/supervisor.js"></script>
</body>
</html>
